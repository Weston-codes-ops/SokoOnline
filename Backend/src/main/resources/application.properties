spring.application.name=sokoonline

server.port = 8080

# Database Configuration
# Use environment variables for production (Railway), fallback to local for development
spring.datasource.url = ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sokoonline}
spring.datasource.username = ${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password = ${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name = org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP Connection Pool Optimizations (for Railway stability)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1


# JWT Configuration

# IMPORTANT: Change this to a long random string in production( never commit the real secret )
# Generate one with: openssl rand -base64 64
jwt.secret=sokoonline-super-secret-key-change-this-in-production-make-it-long
jwt.expiration-ms=86400000

# Admin setup (override in production via env vars)
app.admin.create-secret=Admin-pass00900

# Allowed frontend origins for CORS (comma-separated)
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173,https://sokoonline.co.ke,https://admin.sokoonline.co.ke

# M-Pesa Daraja API credentials
# Get these from developer.safaricom.co.ke after creating an app
mpesa.consumer-key=YOUR_CONSUMER_KEY_HERE
mpesa.consumer-secret=YOUR_CONSUMER_SECRET_HERE

# Sandbox shortcode and passkey (use these for testing)
mpesa.shortcode=174379
mpesa.passkey=bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919

# Callback URL ? must be publicly accessible
# For local testing: use ngrok ? ngrok http 8080
# Then set this to: https://YOUR_NGROK_ID.ngrok.io/api/mpesa/callback
mpesa.callback-url=https://YOUR_NGROK_URL/api/mpesa/callback

# Also add @EnableConfigurationProperties(MpesaConfig.class)
# to your main application class